<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button type="button" id="btn">Send Request</button>

    <script>
        const btn = document.querySelector('#btn');

        btn.addEventListener('click', () => {

            for (i = 1; i < 10; i++) {
                const req = new XMLHttpRequest();

                req.open('GET', 'https://jsonplaceholder.typicode.com/todos/' + i, false);


                req.addEventListener('readystatechange', () => {
                    if (req.readyState == 4 && req.status == 200) {
                        let resp = req.responseText;

                        let jsObj = JSON.parse(resp);

                        console.log(jsObj, typeof jsObj);
                    }

                });
                req.send();
            }

        });

        //ids are in sequence because of synchronous request
    </script>
</body>

</html>
