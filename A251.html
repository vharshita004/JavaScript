<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello</h1>

    <hr>

    <script>
        let x = prompt('Press Yes to Accept, No to Reject and MayBe for Not Sure: ')
        
        switch(x) {
            case 'Yes':
                console.log('Accept')
                break;
            case 'No':
                console.log('Reject')
                break;
            case 'MayBe':
                console.log('Not Sure')  
                break;
            default: 
                console.log('Invalid Input')
        }

        console.log('------')
    </script>
</body>
</html>
