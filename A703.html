    <script>
        const arr = [
                        {name: 'Vijay', age: 23, marks: 56.67},
                        {name: 'Jay', age: 12, marks: 78.89},
                        {name: 'Parajay', age: 34, marks: 62.12},
                        {name: 'Aparajit', age: 9, marks: 67.34}
                    ];

        console.log(arr);
        
        const nameAscSortFunc = (a, b) => {
            // console.log(a.name, b.name, a.name < b.name ? -1 : a.name > b.name ? 1 : 0);
            return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
        };

        const nameDscSortFunc = (a, b) => {
            // console.log(a.name, b.name, a.name < b.name ? -1 : a.name > b.name ? 1 : 0);
            return a.name > b.name ? -1 : a.name < b.name ? 1 : 0;
        };

       // arr.sort(nameAscSortFunc);
        arr.sort(nameDscSortFunc);
        
        console.log(arr);
