<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function process() {
            console.log(this,  ' #-# ', typeof this);
        }

        process();  //works as normal function
        console.log('+++++++++++++++');
        const x = new process();   //function behaves as a class
         console.log(x, ' #$# ', typeof x);
    </script>
</body>
</html>
