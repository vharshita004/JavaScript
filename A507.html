<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <img src="doremon.jpg" width="20%" id="a">

    <script>
        const a = document.querySelector("#a");

        let i = .9;
        let factor = -.1;

        setInterval(() => {
           console.log(i, factor);
           a.style.opacity = i;
           i = i + factor;
           if(i < .1)
            factor = .1;
           else if(i == 1)
            factor = -.1;
        }, 100);
    </script>

</body>
</html>
