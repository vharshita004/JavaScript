<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Hello </h1>

    <hr>

    <script>
        let y = prompt("Enter A for samosa, B for jalebi and C for poha : ");

        switch(y) {
            case 'A':
                console.log('Samosa')
                break;
            case 'B': 
                console.log('Jalebi')
                break;
            case 'C':
                console.log('Poha')
                break;
            default:
                console.log('Kachodi')
        }
    </script>
</body>
</html>
