<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello</h1>

    <hr>

    <script>
        let x = prompt('Press 1.0 to Accept, 0.0 to Reject and .5 for Not Sure: ')
        x = parseFloat(x)
        
        switch(x) {
            case 1.0:
                console.log('Accept')
                break;
            case 0.0:
                console.log('Reject')
                break;
            case .5:
                console.log('Not Sure')  
                break;
            default: 
                console.log('Invalid Input')
        }

        console.log('------')
    </script>
</body>
</html>
