<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family : verdana;
        }

        input {
            font-size : 22px;
            border : 1px solid rgb(186, 193, 194);
            border-radius : 4px ;
            padding : 5px 12px;
        }

        label {
            display : block;
            margin-bottom : 10px;
            font-size : 28px;
        }

        #form_box {
            border : 2px solid rgb(196, 79, 137);
            width : 25%; 
            margin : 20px auto;
            border-radius : 8px;
            padding : 15px;           
        }

        .field_box {
            margin-bottom : 20px;
        }
    </style>
</head>
<body>
    <form action="#" id="frm">
        <div id="form_box">
            <div class="field_box">
                <label for="name">Name</label>
                <input type="text" id="name" class="field">
            </div>
            <div class="field_box">
                <label for="email">Email</label>
                <input type="email" id="email" class="field">
            </div>
            <div class="field_box">
                <label for="dob">DOB</label>
                <input type="date" id="dob" class="field">
            </div>
            <div>
                <input type="button" id="btn" value="Save">
            </div>
        </div>
    </form>

    <script>
         const frm = document.querySelector('#frm');
         const btn = document.querySelector('#btn');
         const fields = document.querySelectorAll('.field');
        
          //console.log(fields);
         btn.addEventListener('click', () => {
            localStorage.setItem('name', fields[0].value);
            localStorage.setItem('email', fields[1].value);
            localStorage.setItem('dob', fields[2].value);

            frm.reset();
         });
     
    </script>
</body>
</html>
