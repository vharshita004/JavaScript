<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const x = new Object();
        console.log(x);
        x.name = 'ram';
        x.age = 34;
         x.show_info = function() {
            console.log(this.name);
        }
        x.phone = '567895434';
        x.address = 'Orange city';
        x.degree = 'Btech';
         
        for(let prop in x) {
            if(typeof prop == 'function')
             x[prop]();  // => x.show_info()
            else {
                console.log(prop, x[prop], typeof x);
            }
        }
    </script>
</body>
</html>
