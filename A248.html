<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello</h1>

    <hr>

    <script>
        let x = prompt('Press 1 for English, 2 for Hindi and 3 for Tamil: ')
        x = parseInt(x)

        switch(x) {
            case 1:
                console.log('Hello')
            case 2:
                console.log('Namaste')
            case 3:
                console.log('Vadakkam')
            default: 
                console.log('Kem Cho...')
        }

        console.log('------')
    </script>
</body>
</html>
