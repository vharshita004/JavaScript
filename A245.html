<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = prompt('Enter 1 for English, 2 for Hindi and 3 for Tamil: ');
        x = parseInt(x);

        switch(x) {
            case 1:
               console.log('Helloo');
                break;
            case 2: 
                console.log('Namaste');
                break;
            case 3:
                console.log('Namaskaram');
                break;
        }
    </script>
</body>
